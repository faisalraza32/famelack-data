name: Sync upstream main

on:
  schedule:
    # Every 6 hours — adjust as you like (cron is UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # lets you run it manually from Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/famelack/famelack-data.git
          git fetch upstream main
          git checkout main
          git merge --ff-only upstream/main
          git push origin main